<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vibe — Social Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- AUTH SCREENS -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-brand">
    <div class="brand-logo">V</div>
    <h1 class="brand-name">Vibe</h1>
    <p class="brand-tagline">Share your world, follow your people.</p>
  </div>

  <!-- Login Form -->
  <div id="login-form" class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to your account</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <div id="login-error" class="form-error hidden"></div>
    <button class="btn btn-primary full-width" onclick="handleLogin()">Sign In</button>
    <p class="auth-switch">Don't have an account? <a href="#" onclick="showRegister()">Sign up</a></p>
  </div>

  <!-- Register Form -->
  <div id="register-form" class="auth-card hidden">
    <h2>Create account</h2>
    <p class="auth-sub">Join Vibe today</p>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="reg-username" placeholder="yourhandle" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters" />
    </div>
    <div class="form-group">
      <label>Bio <span class="optional">(optional)</span></label>
      <input type="text" id="reg-bio" placeholder="Tell us about yourself" />
    </div>
    <div id="reg-error" class="form-error hidden"></div>
    <button class="btn btn-primary full-width" onclick="handleRegister()">Create Account</button>
    <p class="auth-switch">Already have an account? <a href="#" onclick="showLogin()">Sign in</a></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo-sm">V</div>
      <span>Vibe</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="feed" onclick="navigate('feed', this)">
        <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Home</span>
      </a>
      <a class="nav-item" data-page="explore" onclick="navigate('explore', this)">
        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <span>Explore</span>
      </a>
      <a class="nav-item" data-page="profile" onclick="navigate('profile', this)">
        <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span>Profile</span>
      </a>
    </nav>

    <div class="sidebar-user" id="sidebar-user">
      <div class="avatar" id="sidebar-avatar"></div>
      <div class="sidebar-user-info">
        <span class="sidebar-username" id="sidebar-username"></span>
        <a href="#" class="sidebar-logout" onclick="logout()">Log out</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- FEED PAGE -->
    <div id="page-feed" class="page active">
      <div class="page-header">
        <h2>Home</h2>
      </div>
      <div class="compose-box">
        <div class="compose-avatar" id="compose-avatar"></div>
        <div class="compose-right">
          <textarea id="post-input" placeholder="What's on your mind?" rows="3" oninput="autoResize(this)"></textarea>
          <div class="compose-actions">
            <span id="char-count" class="char-count">280</span>
            <button class="btn btn-primary" onclick="createPost()">Post</button>
          </div>
        </div>
      </div>
      <div id="feed-posts" class="posts-container">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- EXPLORE PAGE -->
    <div id="page-explore" class="page hidden">
      <div class="page-header">
        <h2>Explore</h2>
      </div>
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input type="text" id="search-input" placeholder="Search people..." oninput="searchUsers(this.value)" />
      </div>
      <div id="search-results" class="search-results hidden"></div>
      <div id="explore-posts" class="posts-container">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- PROFILE PAGE -->
    <div id="page-profile" class="page hidden">
      <div id="profile-content"></div>
    </div>

  </main>

  <!-- Right Panel -->
  <aside class="right-panel">
    <div class="suggestions-box">
      <h3>People to follow</h3>
      <div id="suggestions-list">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>
  </aside>

</div>

<!-- COMMENTS MODAL -->
<div id="comments-modal" class="modal-overlay hidden" onclick="closeCommentsModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Comments</h3>
      <button class="modal-close" onclick="closeCommentsModal()">✕</button>
    </div>
    <div id="modal-comments-list" class="comments-list"></div>
    <div class="comment-input-box">
      <div class="compose-avatar modal-avatar" id="modal-compose-avatar"></div>
      <input type="text" id="comment-input" placeholder="Add a comment..." />
      <button class="btn btn-primary btn-sm" onclick="submitComment()">Send</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
